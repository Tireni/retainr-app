<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR Sticker Layout Calibrator</title>
  <style>
    :root {
      --bg: #f6f8fc;
      --card: #ffffff;
      --line: #dbe2ee;
      --ink: #0f172a;
      --muted: #52607a;
      --brand: #2563eb;
      --ok: #059669;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", Arial, sans-serif;
    }
    .wrap {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 14px;
      min-height: 100vh;
      padding: 14px;
    }
    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      overflow: auto;
    }
    .panel h1 {
      font-size: 18px;
      margin: 0 0 8px;
    }
    .muted {
      color: var(--muted);
      font-size: 13px;
    }
    .group {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      margin-top: 10px;
    }
    .group h2 {
      margin: 0 0 8px;
      font-size: 14px;
    }
    label {
      display: block;
      margin: 8px 0 4px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .03em;
    }
    input[type="file"], input[type="number"], input[type="range"], select, textarea, button {
      width: 100%;
      font: inherit;
    }
    input[type="number"], select, textarea {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      background: #fff;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }
    button {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      background: #fff;
      cursor: pointer;
      font-weight: 600;
    }
    button.primary {
      background: var(--brand);
      color: #fff;
      border-color: var(--brand);
    }
    button.success {
      background: var(--ok);
      color: #fff;
      border-color: var(--ok);
    }
    textarea {
      min-height: 160px;
      resize: vertical;
      font-family: Consolas, Menlo, monospace;
      font-size: 12px;
    }
    .canvas-wrap {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      overflow: auto;
      min-height: 0;
    }
    .stage-holder {
      min-height: calc(100vh - 60px);
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      overflow: auto;
      padding: 8px;
      border-radius: 10px;
      background: #eef2f8;
      border: 1px dashed #c8d3e3;
    }
    .stage {
      position: relative;
      display: inline-block;
      transform-origin: top left;
      user-select: none;
      border: 2px dashed transparent;
    }
    .stage.selected {
      border-color: #94a3b8;
    }
    .stage img.bg {
      display: block;
      max-width: none;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .layer {
      position: absolute;
      border: 2px solid transparent;
      cursor: move;
      touch-action: none;
    }
    .layer.selected {
      border-color: var(--brand);
      box-shadow: 0 0 0 1px rgba(37,99,235,.2);
    }
    .layer img {
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
    }
    .resize-handle,
    .stage-resize-handle {
      position: absolute;
      width: 12px;
      height: 12px;
      background: var(--brand);
      border: 2px solid #fff;
      border-radius: 50%;
      display: none;
      pointer-events: auto;
      z-index: 8;
    }
    .layer.selected .resize-handle,
    .stage.selected .stage-resize-handle {
      display: block;
    }
    .resize-handle[data-dir="nw"], .stage-resize-handle[data-dir="nw"] { left: -7px; top: -7px; cursor: nwse-resize; }
    .resize-handle[data-dir="n"], .stage-resize-handle[data-dir="n"] { left: 50%; top: -7px; transform: translateX(-50%); cursor: ns-resize; }
    .resize-handle[data-dir="ne"], .stage-resize-handle[data-dir="ne"] { right: -7px; top: -7px; cursor: nesw-resize; }
    .resize-handle[data-dir="e"], .stage-resize-handle[data-dir="e"] { right: -7px; top: 50%; transform: translateY(-50%); cursor: ew-resize; }
    .resize-handle[data-dir="se"], .stage-resize-handle[data-dir="se"] { right: -7px; bottom: -7px; cursor: nwse-resize; }
    .resize-handle[data-dir="s"], .stage-resize-handle[data-dir="s"] { left: 50%; bottom: -7px; transform: translateX(-50%); cursor: ns-resize; }
    .resize-handle[data-dir="sw"], .stage-resize-handle[data-dir="sw"] { left: -7px; bottom: -7px; cursor: nesw-resize; }
    .resize-handle[data-dir="w"], .stage-resize-handle[data-dir="w"] { left: -7px; top: 50%; transform: translateY(-50%); cursor: ew-resize; }
    .pill {
      display: inline-block;
      margin-top: 6px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #e8f0ff;
      color: #1e40af;
      font-size: 11px;
      font-weight: 700;
    }
    @media (max-width: 980px) {
      .wrap {
        grid-template-columns: 1fr;
      }
      .stage-holder {
        min-height: 60vh;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <aside class="panel">
      <h1>QR Sticker Layout Calibrator</h1>
      <div class="muted">Use this locally: open this file in your browser, upload images, drag/resize, then copy JSON and send it back.</div>

      <div class="group">
        <h2>1. Upload Images</h2>
        <label>Sticker Background *</label>
        <input id="bgInput" type="file" accept="image/*">
        <label>Demo QR Code *</label>
        <input id="qrInput" type="file" accept="image/*">
        <label>Company Logo (optional)</label>
        <input id="logoInput" type="file" accept="image/*">
        <div class="pill" id="stageSizePill">Background: 0 x 0</div>
      </div>

      <div class="group">
        <h2>2. View Controls</h2>
        <div class="row">
          <div>
            <label>Sticker Background Width</label>
            <input id="stageWInput" type="number" min="1" step="1">
          </div>
          <div>
            <label>Sticker Background Height</label>
            <input id="stageHInput" type="number" min="1" step="1">
          </div>
        </div>
        <div class="row" style="margin-top:8px;">
          <button id="applyStageSizeBtn" type="button">Apply Background Size</button>
          <button id="resetStageToBgBtn" type="button">Reset to Original Image</button>
        </div>
        <div class="muted" style="margin-top:6px;">Tip: press Enter in width/height fields to apply instantly.</div>
        <label>Zoom</label>
        <input id="zoomRange" type="range" min="20" max="200" value="100">
        <div class="row">
          <button id="fitBtn" type="button">Fit Width</button>
          <button id="resetZoomBtn" type="button">100%</button>
        </div>
      </div>

      <div class="group">
        <h2>3. Edit Layer</h2>
        <label>Layer</label>
        <select id="layerSelect">
          <option value="stage">Stage</option>
          <option value="qr">QR</option>
          <option value="logo">Logo</option>
        </select>
        <div class="row">
          <div>
            <label>X</label>
            <input id="xInput" type="number" step="1">
          </div>
          <div>
            <label>Y</label>
            <input id="yInput" type="number" step="1">
          </div>
        </div>
        <div class="row">
          <div>
            <label>Width</label>
            <input id="wInput" type="number" step="1">
          </div>
          <div>
            <label>Height</label>
            <input id="hInput" type="number" step="1">
          </div>
        </div>
        <div class="btn-row">
          <button id="centerHBtn" type="button">Center Horiz.</button>
          <button id="centerVBtn" type="button">Center Vert.</button>
        </div>
        <div class="btn-row">
          <button id="bringFrontBtn" type="button">Bring Front</button>
          <button id="sendBackBtn" type="button">Send Back</button>
        </div>
      </div>

      <div class="group">
        <h2>4. Export</h2>
        <textarea id="jsonOutput" readonly></textarea>
        <div class="btn-row">
          <button id="generateBtn" class="primary" type="button">Generate JSON</button>
          <button id="copyBtn" class="success" type="button">Copy JSON</button>
        </div>
        <div class="btn-row">
          <button id="downloadJsonBtn" type="button">Download JSON</button>
          <button id="downloadPreviewBtn" type="button">Download Preview PNG</button>
        </div>
      </div>
    </aside>

    <section class="canvas-wrap">
      <div class="stage-holder" id="stageHolder">
        <div class="stage" id="stage">
          <img class="bg" id="bgImg" alt="">
          <div class="layer" id="qrLayer" data-layer="qr" hidden>
            <img id="qrImg" alt="QR">
            <div class="resize-handle" data-handle="resize" data-dir="nw"></div>
            <div class="resize-handle" data-handle="resize" data-dir="n"></div>
            <div class="resize-handle" data-handle="resize" data-dir="ne"></div>
            <div class="resize-handle" data-handle="resize" data-dir="e"></div>
            <div class="resize-handle" data-handle="resize" data-dir="se"></div>
            <div class="resize-handle" data-handle="resize" data-dir="s"></div>
            <div class="resize-handle" data-handle="resize" data-dir="sw"></div>
            <div class="resize-handle" data-handle="resize" data-dir="w"></div>
          </div>
          <div class="layer" id="logoLayer" data-layer="logo" hidden>
            <img id="logoImg" alt="Logo">
            <div class="resize-handle" data-handle="resize" data-dir="nw"></div>
            <div class="resize-handle" data-handle="resize" data-dir="n"></div>
            <div class="resize-handle" data-handle="resize" data-dir="ne"></div>
            <div class="resize-handle" data-handle="resize" data-dir="e"></div>
            <div class="resize-handle" data-handle="resize" data-dir="se"></div>
            <div class="resize-handle" data-handle="resize" data-dir="s"></div>
            <div class="resize-handle" data-handle="resize" data-dir="sw"></div>
            <div class="resize-handle" data-handle="resize" data-dir="w"></div>
          </div>
          <div class="stage-resize-handle" data-stage-handle="1" data-dir="nw"></div>
          <div class="stage-resize-handle" data-stage-handle="1" data-dir="n"></div>
          <div class="stage-resize-handle" data-stage-handle="1" data-dir="ne"></div>
          <div class="stage-resize-handle" data-stage-handle="1" data-dir="e"></div>
          <div class="stage-resize-handle" data-stage-handle="1" data-dir="se"></div>
          <div class="stage-resize-handle" data-stage-handle="1" data-dir="s"></div>
          <div class="stage-resize-handle" data-stage-handle="1" data-dir="sw"></div>
          <div class="stage-resize-handle" data-stage-handle="1" data-dir="w"></div>
        </div>
      </div>
    </section>
  </div>

  <script>
    (function () {
      const bgInput = document.getElementById("bgInput");
      const qrInput = document.getElementById("qrInput");
      const logoInput = document.getElementById("logoInput");
      const zoomRange = document.getElementById("zoomRange");
      const fitBtn = document.getElementById("fitBtn");
      const resetZoomBtn = document.getElementById("resetZoomBtn");
      const stage = document.getElementById("stage");
      const stageHolder = document.getElementById("stageHolder");
      const bgImg = document.getElementById("bgImg");
      const qrLayer = document.getElementById("qrLayer");
      const logoLayer = document.getElementById("logoLayer");
      const qrImg = document.getElementById("qrImg");
      const logoImg = document.getElementById("logoImg");
      const layerSelect = document.getElementById("layerSelect");
      const xInput = document.getElementById("xInput");
      const yInput = document.getElementById("yInput");
      const wInput = document.getElementById("wInput");
      const hInput = document.getElementById("hInput");
      const centerHBtn = document.getElementById("centerHBtn");
      const centerVBtn = document.getElementById("centerVBtn");
      const bringFrontBtn = document.getElementById("bringFrontBtn");
      const sendBackBtn = document.getElementById("sendBackBtn");
      const generateBtn = document.getElementById("generateBtn");
      const copyBtn = document.getElementById("copyBtn");
      const downloadJsonBtn = document.getElementById("downloadJsonBtn");
      const downloadPreviewBtn = document.getElementById("downloadPreviewBtn");
      const jsonOutput = document.getElementById("jsonOutput");
      const stageSizePill = document.getElementById("stageSizePill");
      const stageWInput = document.getElementById("stageWInput");
      const stageHInput = document.getElementById("stageHInput");
      const applyStageSizeBtn = document.getElementById("applyStageSizeBtn");
      const resetStageToBgBtn = document.getElementById("resetStageToBgBtn");

      const state = {
        stageW: 0,
        stageH: 0,
        selected: "stage",
        dragging: null,
        resizing: null,
        resizeDir: "",
        resizingStage: false,
        startX: 0,
        startY: 0,
        base: null,
      };

      function px(n) { return `${Math.round(n)}px`; }
      function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
      function round4(n) { return Math.round(n * 10000) / 10000; }
      function selectedLayerEl() {
        if (state.selected === "logo") return logoLayer;
        if (state.selected === "qr") return qrLayer;
        return null;
      }

      function getRect(el) {
        return {
          x: parseFloat(el.style.left || "0"),
          y: parseFloat(el.style.top || "0"),
          w: parseFloat(el.style.width || "0"),
          h: parseFloat(el.style.height || "0"),
          z: parseInt(el.style.zIndex || "2", 10),
        };
      }

      function setRect(el, rect) {
        const maxX = Math.max(0, state.stageW - rect.w);
        const maxY = Math.max(0, state.stageH - rect.h);
        const x = clamp(rect.x, 0, maxX);
        const y = clamp(rect.y, 0, maxY);
        const w = clamp(rect.w, 10, state.stageW);
        const h = clamp(rect.h, 10, state.stageH);
        el.style.left = px(x);
        el.style.top = px(y);
        el.style.width = px(w);
        el.style.height = px(h);
        if (rect.z != null) el.style.zIndex = String(rect.z);
      }

      function refreshLayerInputs() {
        const el = selectedLayerEl();
        const isStage = state.selected === "stage";
        if (isStage) {
          xInput.value = "0";
          yInput.value = "0";
          wInput.value = String(Math.round(state.stageW || 0));
          hInput.value = String(Math.round(state.stageH || 0));
        } else if (el) {
          const r = getRect(el);
          xInput.value = String(Math.round(r.x));
          yInput.value = String(Math.round(r.y));
          wInput.value = String(Math.round(r.w));
          hInput.value = String(Math.round(r.h));
        }
        xInput.disabled = isStage;
        yInput.disabled = isStage;
        [qrLayer, logoLayer].forEach((layer) => layer.classList.remove("selected"));
        stage.classList.toggle("selected", isStage);
        if (!isStage && el) el.classList.add("selected");
      }

      function ensureLayerDefault(el, imgEl) {
        if (el.hidden || !imgEl.naturalWidth || !state.stageW || !state.stageH) return;
        if (!el.style.width || !el.style.height) {
          const maxW = state.stageW * 0.35;
          const ratio = imgEl.naturalWidth / imgEl.naturalHeight;
          const w = Math.max(40, Math.min(maxW, imgEl.naturalWidth));
          const h = w / ratio;
          setRect(el, {
            x: (state.stageW - w) / 2,
            y: (state.stageH - h) / 2,
            w,
            h,
            z: el === qrLayer ? 3 : 2,
          });
        }
      }

      function updateStageSize(w, h) {
        const nextW = Math.max(1, Math.round(w || 0));
        const nextH = Math.max(1, Math.round(h || 0));
        state.stageW = nextW;
        state.stageH = nextH;
        stage.style.width = px(nextW);
        stage.style.height = px(nextH);
        stageSizePill.textContent = `Background: ${nextW} x ${nextH}`;
        if (stageWInput) stageWInput.value = String(nextW);
        if (stageHInput) stageHInput.value = String(nextH);
        ensureLayerDefault(qrLayer, qrImg);
        ensureLayerDefault(logoLayer, logoImg);
        refreshLayerInputs();
      }

      function resizeRectFromHandle(base, dx, dy, dir, maxW, maxH) {
        let x = base.x;
        let y = base.y;
        let w = base.w;
        let h = base.h;

        if (dir.includes("e")) w = base.w + dx;
        if (dir.includes("s")) h = base.h + dy;
        if (dir.includes("w")) { w = base.w - dx; x = base.x + dx; }
        if (dir.includes("n")) { h = base.h - dy; y = base.y + dy; }

        const minW = 10;
        const minH = 10;

        if (w < minW) {
          if (dir.includes("w")) x -= (minW - w);
          w = minW;
        }
        if (h < minH) {
          if (dir.includes("n")) y -= (minH - h);
          h = minH;
        }

        if (x < 0) {
          if (dir.includes("w")) w += x;
          x = 0;
        }
        if (y < 0) {
          if (dir.includes("n")) h += y;
          y = 0;
        }
        if (x + w > maxW) {
          if (dir.includes("e")) w = maxW - x;
          else x = maxW - w;
        }
        if (y + h > maxH) {
          if (dir.includes("s")) h = maxH - y;
          else y = maxH - h;
        }

        w = clamp(w, minW, maxW);
        h = clamp(h, minH, maxH);
        x = clamp(x, 0, Math.max(0, maxW - w));
        y = clamp(y, 0, Math.max(0, maxH - h));

        return { x, y, w, h, z: base.z };
      }

      function resizeStageFromHandle(base, dx, dy, dir) {
        let w = base.w;
        let h = base.h;
        if (dir.includes("e")) w = base.w + dx;
        if (dir.includes("s")) h = base.h + dy;
        if (dir.includes("w")) w = base.w - dx;
        if (dir.includes("n")) h = base.h - dy;
        return {
          w: clamp(Math.round(w), 50, 5000),
          h: clamp(Math.round(h), 50, 5000),
        };
      }

      function readFileAsDataUrl(file, cb) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => cb(String(reader.result || ""));
        reader.readAsDataURL(file);
      }

      function applyZoom(percent) {
        const scale = clamp(percent / 100, 0.2, 2);
        stage.style.transform = `scale(${scale})`;
      }

      function fitWidth() {
        if (!state.stageW) return;
        const avail = stageHolder.clientWidth - 24;
        const zoom = clamp((avail / state.stageW) * 100, 20, 200);
        zoomRange.value = String(Math.round(zoom));
        applyZoom(zoom);
      }

      function bindLayerDrag(layer) {
        layer.addEventListener("pointerdown", (event) => {
          const target = event.target;
          const isResize = target instanceof HTMLElement && target.dataset.handle === "resize";
          const dir = isResize && target instanceof HTMLElement ? String(target.dataset.dir || "se") : "";
          state.selected = layer.dataset.layer || "qr";
          layerSelect.value = state.selected;
          refreshLayerInputs();

          const r = getRect(layer);
          state.startX = event.clientX;
          state.startY = event.clientY;
          state.base = r;
          state.dragging = isResize ? null : layer;
          state.resizing = isResize ? layer : null;
          state.resizeDir = dir;
          state.resizingStage = false;
          layer.setPointerCapture(event.pointerId);
          event.preventDefault();
        });

        layer.addEventListener("pointermove", (event) => {
          if (!state.base) return;
          const dx = event.clientX - state.startX;
          const dy = event.clientY - state.startY;

          if (state.dragging === layer) {
            setRect(layer, {
              x: state.base.x + dx,
              y: state.base.y + dy,
              w: state.base.w,
              h: state.base.h,
              z: state.base.z,
            });
            refreshLayerInputs();
          } else if (state.resizing === layer) {
            const next = resizeRectFromHandle(
              state.base,
              dx,
              dy,
              state.resizeDir || "se",
              state.stageW,
              state.stageH
            );
            setRect(layer, next);
            refreshLayerInputs();
          }
        });

        const clearPointer = () => {
          state.dragging = null;
          state.resizing = null;
          state.resizeDir = "";
          state.resizingStage = false;
          state.base = null;
        };
        layer.addEventListener("pointerup", clearPointer);
        layer.addEventListener("pointercancel", clearPointer);
      }

      function bindStageHandles() {
        const handles = stage.querySelectorAll("[data-stage-handle]");
        handles.forEach((handle) => {
          handle.addEventListener("pointerdown", (event) => {
            const dir = String(handle.getAttribute("data-dir") || "se");
            state.selected = "stage";
            layerSelect.value = "stage";
            refreshLayerInputs();
            state.startX = event.clientX;
            state.startY = event.clientY;
            state.base = { w: state.stageW, h: state.stageH, x: 0, y: 0, z: 0 };
            state.resizingStage = true;
            state.resizeDir = dir;
            handle.setPointerCapture(event.pointerId);
            event.preventDefault();
          });

          handle.addEventListener("pointermove", (event) => {
            if (!state.resizingStage || !state.base) return;
            const dx = event.clientX - state.startX;
            const dy = event.clientY - state.startY;
            const next = resizeStageFromHandle(state.base, dx, dy, state.resizeDir || "se");
            updateStageSize(next.w, next.h);
          });

          const clearStagePointer = () => {
            state.resizingStage = false;
            state.resizeDir = "";
            state.base = null;
          };
          handle.addEventListener("pointerup", clearStagePointer);
          handle.addEventListener("pointercancel", clearStagePointer);
        });
      }

      function buildJson() {
        if (!state.stageW || !state.stageH || qrLayer.hidden) return "";
        const qr = getRect(qrLayer);
        const logo = logoLayer.hidden ? null : getRect(logoLayer);

        const out = {
          canvas: {
            width: state.stageW,
            height: state.stageH,
          },
          qr: {
            x: Math.round(qr.x),
            y: Math.round(qr.y),
            width: Math.round(qr.w),
            height: Math.round(qr.h),
            x_pct: round4(qr.x / state.stageW),
            y_pct: round4(qr.y / state.stageH),
            width_pct: round4(qr.w / state.stageW),
            height_pct: round4(qr.h / state.stageH),
          },
          logo: logo
            ? {
                x: Math.round(logo.x),
                y: Math.round(logo.y),
                width: Math.round(logo.w),
                height: Math.round(logo.h),
                x_pct: round4(logo.x / state.stageW),
                y_pct: round4(logo.y / state.stageH),
                width_pct: round4(logo.w / state.stageW),
                height_pct: round4(logo.h / state.stageH),
              }
            : null,
        };
        return JSON.stringify(out, null, 2);
      }

      bgInput.addEventListener("change", () => {
        const file = bgInput.files && bgInput.files[0];
        readFileAsDataUrl(file, (url) => {
          bgImg.onload = () => {
            updateStageSize(bgImg.naturalWidth, bgImg.naturalHeight);
            fitWidth();
          };
          bgImg.src = url;
        });
      });

      qrInput.addEventListener("change", () => {
        const file = qrInput.files && qrInput.files[0];
        readFileAsDataUrl(file, (url) => {
          qrImg.onload = () => {
            qrLayer.hidden = false;
            ensureLayerDefault(qrLayer, qrImg);
            state.selected = "qr";
            layerSelect.value = "qr";
            refreshLayerInputs();
          };
          qrImg.src = url;
        });
      });

      logoInput.addEventListener("change", () => {
        const file = logoInput.files && logoInput.files[0];
        if (!file) {
          logoLayer.hidden = true;
          if (state.selected === "logo") {
            state.selected = "stage";
            layerSelect.value = "stage";
            refreshLayerInputs();
          }
          return;
        }
        readFileAsDataUrl(file, (url) => {
          logoImg.onload = () => {
            logoLayer.hidden = false;
            ensureLayerDefault(logoLayer, logoImg);
            state.selected = "logo";
            layerSelect.value = "logo";
            refreshLayerInputs();
          };
          logoImg.src = url;
        });
      });

      zoomRange.addEventListener("input", () => applyZoom(parseInt(zoomRange.value, 10) || 100));
      fitBtn.addEventListener("click", fitWidth);
      resetZoomBtn.addEventListener("click", () => {
        zoomRange.value = "100";
        applyZoom(100);
      });

      function applyBackgroundSizeFromInputs() {
        const nextW = parseInt(stageWInput.value || "0", 10);
        const nextH = parseInt(stageHInput.value || "0", 10);
        if (!nextW || !nextH) return;
        updateStageSize(nextW, nextH);
        fitWidth();
      }

      applyStageSizeBtn.addEventListener("click", applyBackgroundSizeFromInputs);
      resetStageToBgBtn.addEventListener("click", () => {
        if (!bgImg.naturalWidth || !bgImg.naturalHeight) return;
        updateStageSize(bgImg.naturalWidth, bgImg.naturalHeight);
        fitWidth();
      });
      [stageWInput, stageHInput].forEach((input) => {
        input.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            applyBackgroundSizeFromInputs();
          }
        });
        input.addEventListener("change", applyBackgroundSizeFromInputs);
      });

      layerSelect.addEventListener("change", () => {
        const selected = layerSelect.value;
        if (selected === "logo" && logoLayer.hidden) {
          state.selected = "stage";
          layerSelect.value = "stage";
        } else if (selected === "qr" && qrLayer.hidden) {
          state.selected = "stage";
          layerSelect.value = "stage";
        } else if (selected === "stage" || selected === "logo" || selected === "qr") {
          state.selected = selected;
        } else {
          state.selected = "stage";
          layerSelect.value = "stage";
        }
        refreshLayerInputs();
      });

      [xInput, yInput, wInput, hInput].forEach((input) => {
        input.addEventListener("change", () => {
          if (state.selected === "stage") {
            const nextW = parseFloat(wInput.value || "0");
            const nextH = parseFloat(hInput.value || "0");
            if (!nextW || !nextH) return;
            updateStageSize(nextW, nextH);
            return;
          }
          const el = selectedLayerEl();
          if (!el || el.hidden) return;
          setRect(el, {
            ...getRect(el),
            x: parseFloat(xInput.value || "0"),
            y: parseFloat(yInput.value || "0"),
            w: parseFloat(wInput.value || "0"),
            h: parseFloat(hInput.value || "0"),
          });
          refreshLayerInputs();
        });
      });

      centerHBtn.addEventListener("click", () => {
        const el = selectedLayerEl();
        if (!el || el.hidden) return;
        const r = getRect(el);
        setRect(el, { ...r, x: (state.stageW - r.w) / 2 });
        refreshLayerInputs();
      });

      centerVBtn.addEventListener("click", () => {
        const el = selectedLayerEl();
        if (!el || el.hidden) return;
        const r = getRect(el);
        setRect(el, { ...r, y: (state.stageH - r.h) / 2 });
        refreshLayerInputs();
      });

      bringFrontBtn.addEventListener("click", () => {
        const el = selectedLayerEl();
        if (!el || el.hidden) return;
        el.style.zIndex = "5";
        (el === qrLayer ? logoLayer : qrLayer).style.zIndex = "2";
        refreshLayerInputs();
      });

      sendBackBtn.addEventListener("click", () => {
        const el = selectedLayerEl();
        if (!el || el.hidden) return;
        el.style.zIndex = "2";
        (el === qrLayer ? logoLayer : qrLayer).style.zIndex = "5";
        refreshLayerInputs();
      });

      generateBtn.addEventListener("click", () => {
        jsonOutput.value = buildJson() || "Upload background + QR first.";
      });

      copyBtn.addEventListener("click", async () => {
        const data = buildJson();
        if (!data) return;
        jsonOutput.value = data;
        await navigator.clipboard.writeText(data);
        copyBtn.textContent = "Copied";
        setTimeout(() => (copyBtn.textContent = "Copy JSON"), 1000);
      });

      downloadJsonBtn.addEventListener("click", () => {
        const data = buildJson();
        if (!data) return;
        jsonOutput.value = data;
        const blob = new Blob([data], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "qr-layout.json";
        a.click();
        URL.revokeObjectURL(url);
      });

      downloadPreviewBtn.addEventListener("click", () => {
        if (!state.stageW || !state.stageH || !bgImg.src || qrLayer.hidden) return;
        const canvas = document.createElement("canvas");
        canvas.width = state.stageW;
        canvas.height = state.stageH;
        const ctx = canvas.getContext("2d");
        if (!ctx) return;
        ctx.drawImage(bgImg, 0, 0, state.stageW, state.stageH);

        const qr = getRect(qrLayer);
        ctx.drawImage(qrImg, qr.x, qr.y, qr.w, qr.h);

        if (!logoLayer.hidden && logoImg.src) {
          const logo = getRect(logoLayer);
          ctx.drawImage(logoImg, logo.x, logo.y, logo.w, logo.h);
        }

        canvas.toBlob((blob) => {
          if (!blob) return;
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "qr-layout-preview.png";
          a.click();
          URL.revokeObjectURL(url);
        }, "image/png");
      });

      bindLayerDrag(qrLayer);
      bindLayerDrag(logoLayer);
      bindStageHandles();
      refreshLayerInputs();
    })();
  </script>
</body>
</html>
