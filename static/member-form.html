<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Retainr - Member Form</title>
  <link rel="icon" type="image/png" href="/static/images/logo.png">
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="app-sidebar">
      <div class="app-brand"><div class="logo">Retain<span>r</span></div></div>
      <div class="sidebar-section-title">Control Panel</div>
      <nav class="sidebar-nav">
        <a href="/dashboard">Home</a>
        <a class="active" href="/members">Members</a>
        <a href="/messages">Messages</a>
        <a href="/social-links">Social Links</a>
        <a href="/stickers">Stickers</a>
        <a href="/my-checkin" target="_blank" rel="noopener">Check In</a>
        <a href="/settings">Settings</a>
        <a href="#" class="js-admin-logout">Logout</a>
      </nav>
    </aside>

    <div class="sidebar-backdrop" data-sidebar-backdrop></div>

    <main class="app-main">
      <div class="container">
        <div class="mobile-header">
          <div class="logo">Retain<span>r</span></div>
          <button class="sidebar-toggle" data-sidebar-toggle aria-label="Open menu">☰</button>
        </div>

        <h1 id="form-title">Add Member</h1>
        <p class="page-subtitle">Add member details quickly so Retainr can track activity.</p>

        <div id="form-alert" class="alert error" style="display:none;"></div>

        <section class="card form-card">
          <form id="member-form">
            <div class="form-grid">
              <div>
                <label for="name">Name</label>
                <input id="name" name="name" required>
              </div>
              <div>
                <label for="phone">Phone (WhatsApp)</label>
                <input id="phone" name="phone" required>
              </div>
              <div>
                <label for="monthly_fee">Monthly Fee (NGN)</label>
                <input id="monthly_fee" name="monthly_fee" type="number" step="0.01" min="0" required>
              </div>
              <div>
                <label for="expiry_date">Expiry Date</label>
                <input id="expiry_date" name="expiry_date" type="date" required>
              </div>
              <div>
                <label for="last_visit">Last Visit (optional)</label>
                <input id="last_visit" name="last_visit" type="date">
              </div>
              <div>
                <label for="goal">Goal (optional)</label>
                <input id="goal" name="goal" placeholder="Customer goal / service target">
              </div>
              <div>
                <label for="purpose">Purpose (optional)</label>
                <input id="purpose" name="purpose" placeholder="Service / Session / Consultation">
              </div>
              <div>
                <label for="preferred_time">Preferred Time (optional)</label>
                <input id="preferred_time" name="preferred_time" placeholder="Morning / Evening">
              </div>
            </div>

            <div class="row" style="margin-top:14px;">
              <button id="save-btn" type="submit">Save Member</button>
              <a class="btn btn-secondary" href="/members">Cancel</a>
            </div>
          </form>
        </section>
      </div>
    </main>
  </div>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/admin-nav.js"></script>
  <script src="/static/js/sidebar.js"></script>
  <script src="/static/js/member-form.js"></script>
</body>
</html>
