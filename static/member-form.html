<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Retainr - Member Form</title>
  <link rel="icon" type="image/png" href="/static/images/logo.png">
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="container">
      <div class="logo">Retain<span>r</span></div>
      <nav class="nav">
        <a href="/dashboard">Dashboard</a>
        <a href="/members">Members</a>
        <a href="/my-checkin">My Check-In Page</a>
        <a href="#" class="js-admin-logout">Logout</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1 id="form-title">Add Member</h1>
    <p class="page-subtitle">Input member details fast so Retainr can detect risk and recover revenue.</p>

    <div id="form-alert" class="alert error" style="display:none;"></div>

    <section class="card form-card">
      <form id="member-form">
        <div class="form-grid">
          <div>
            <label for="name">Name</label>
            <input id="name" name="name" required>
          </div>
          <div>
            <label for="phone">Phone (WhatsApp)</label>
            <input id="phone" name="phone" required>
          </div>
          <div>
            <label for="monthly_fee">Monthly Fee (NGN)</label>
            <input id="monthly_fee" name="monthly_fee" type="number" step="0.01" min="0" required>
          </div>
          <div>
            <label for="expiry_date">Expiry Date</label>
            <input id="expiry_date" name="expiry_date" type="date" required>
          </div>
          <div>
            <label for="last_visit">Last Visit (optional)</label>
            <input id="last_visit" name="last_visit" type="date">
          </div>
          <div>
            <label for="goal">Goal (optional)</label>
            <input id="goal" name="goal" placeholder="Weight loss, strength, etc.">
          </div>
          <div>
            <label for="purpose">Purpose (optional)</label>
            <input id="purpose" name="purpose" placeholder="Workout / Cardio / Strength">
          </div>
          <div>
            <label for="preferred_time">Preferred Time (optional)</label>
            <input id="preferred_time" name="preferred_time" placeholder="Morning / Evening">
          </div>
        </div>

        <div class="row" style="margin-top:14px;">
          <button id="save-btn" type="submit">Save Member</button>
          <a class="btn btn-secondary" href="/members">Cancel</a>
        </div>
      </form>
    </section>
  </main>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/admin-nav.js"></script>
  <script src="/static/js/mobile-nav.js"></script>
  <script src="/static/js/member-form.js"></script>
</body>
</html>
