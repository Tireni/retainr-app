<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Retainr - Members</title>
  <link rel="icon" type="image/png" href="/static/images/logo.png">
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="container">
      <div class="logo">Retain<span>r</span></div>
      <nav class="nav">
        <a href="/dashboard">Dashboard</a>
        <a class="active" href="/members">Members</a>
        <a href="/my-checkin">My Check-In Page</a>
        <a href="#" class="js-admin-logout">Logout</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1>Members</h1>
    <p class="page-subtitle">Track every member, spot risk early, and trigger recovery actions.</p>

    <div id="members-alert" class="alert error" style="display:none;"></div>

    <section class="card">
      <div class="row space-between mobile-col">
        <div class="row">
          <button class="btn-outline active" data-filter="all">All</button>
          <button class="btn-outline" data-filter="active">Active</button>
          <button class="btn-outline" data-filter="at_risk">At Risk</button>
          <button class="btn-outline" data-filter="lost">Lost</button>
        </div>
        <div class="row">
          <input id="search-input" type="text" placeholder="Search name or phone">
          <button id="bulk-send-btn" class="btn btn-secondary" type="button">Send WhatsApp to Selected</button>
        </div>
      </div>
    </section>

    <section>
      <table>
        <thead>
          <tr>
            <th><input id="select-all-checkbox" type="checkbox" title="Select all visible"></th>
            <th>Name</th>
            <th>Phone</th>
            <th>Last Visit</th>
            <th>Expiry Date</th>
            <th>Status</th>
            <th>Monthly Fee</th>
            <th>Days Inactive</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="members-body"></tbody>
      </table>
    </section>
  </main>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/admin-nav.js"></script>
  <script src="/static/js/mobile-nav.js"></script>
  <script src="/static/js/members.js"></script>
</body>
</html>
