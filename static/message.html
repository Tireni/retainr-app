<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Retainr - Send Message</title>
  <link rel="icon" type="image/png" href="/static/images/logo.png">
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="app-sidebar">
      <div class="app-brand"><div class="logo">Retain<span>r</span></div></div>
      <div class="sidebar-section-title">Control Panel</div>
      <nav class="sidebar-nav">
        <a href="/dashboard">Home</a>
        <a class="active" href="/members">Members</a>
        <a href="/messages">Messages</a>
        <a href="/social-links">Social Links</a>
        <a href="/stickers">Stickers</a>
        <a href="/my-checkin" target="_blank" rel="noopener">Check In</a>
        <a href="/settings">Settings</a>
        <a href="#" class="js-admin-logout">Logout</a>
      </nav>
    </aside>

    <div class="sidebar-backdrop" data-sidebar-backdrop></div>

    <main class="app-main">
      <div class="container">
        <div class="mobile-header">
          <div class="logo">Retain<span>r</span></div>
          <button class="sidebar-toggle" data-sidebar-toggle aria-label="Open menu">☰</button>
        </div>

        <h1>Send Message</h1>
        <p class="page-subtitle">Send a quick WhatsApp message to this member.</p>

        <div id="message-alert" class="alert error" style="display:none;"></div>

        <section class="card form-card">
          <p><strong>Member:</strong> <span id="member-name">-</span></p>
          <p><strong>Status:</strong> <span id="member-status">-</span></p>
          <label for="message-box">Message</label>
          <textarea id="message-box"></textarea>
          <div class="row" style="margin-top:12px;">
            <button id="send-btn" type="button">Send via WhatsApp</button>
            <a class="btn btn-secondary" href="/members">Cancel</a>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/admin-nav.js"></script>
  <script src="/static/js/sidebar.js"></script>
  <script src="/static/js/message.js"></script>
</body>
</html>
